<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoAndStudy — Обучение</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700&family=Mulish:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#18181f;--bg2:#1e1e27;--bg3:#252530;--bg4:#2c2c3a;
  --purple:#B15ECC;--pd:#B15ECC22;--pb:#B15ECC40;
  --gold:#FFAC02;--gd:#FFAC0215;--gb:#FFAC0235;
  --green:#22c55e;--grd:#22c55e15;--grb:#22c55e40;
  --red:#f87171;
  --border:#ffffff0f;--b2:#ffffff1a;--b3:#ffffff28;
  --text:#eeeef0;--t2:#9898b0;--t3:#55556a;
  --r:14px;--rs:10px;--rx:7px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Mulish',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b3);border-radius:2px}
.hide{display:none!important}
.hdr{position:sticky;top:0;z-index:100;background:rgba(24,24,31,.93);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:76px}
.logo{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.logo span{color:var(--purple)}
.logo-sq{width:26px;height:26px;border-radius:7px;background:var(--pd);border:1px solid var(--pb);display:flex;align-items:center;justify-content:center;font-size:12px}
.hdr-right{display:flex;align-items:center;gap:10px}
.hdr-user{font-size:12px;color:var(--t2)}
.hdr-btn{font-size:11px;color:var(--t3);background:var(--bg3);border:1px solid var(--border);padding:4px 12px;border-radius:20px;cursor:pointer;font-family:'Mulish',sans-serif;transition:all .15s}
.hdr-btn:hover{border-color:var(--b2);color:var(--t2)}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 76px);padding:2rem}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:2rem;width:100%;max-width:380px}
.login-logo{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:700;margin-bottom:4px}
.login-logo span{color:var(--purple)}
.login-sub{font-size:13px;color:var(--t2);margin-bottom:1.5rem}
.f-label{display:block;font-size:12px;color:var(--t2);margin-bottom:5px;font-weight:600}
.f-input{width:100%;padding:9px 13px;border:1px solid var(--b2);border-radius:var(--rs);background:var(--bg3);color:var(--text);font-size:13px;font-family:'Mulish',sans-serif;outline:none;transition:border .15s;margin-bottom:10px}
.f-input:focus{border-color:var(--pb)}
.f-input::placeholder{color:var(--t3)}
.btn-primary{width:100%;padding:10px;background:var(--purple);color:#fff;border:none;border-radius:var(--rs);font-size:13px;font-weight:700;cursor:pointer;font-family:'Mulish',sans-serif;transition:background .15s}
.btn-primary:hover{background:#9a4fb5}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.login-err{font-size:12px;color:var(--red);margin-top:8px;display:none}
.layout{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 76px)}
.sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:1rem 0;position:sticky;top:76px;height:calc(100vh - 76px);overflow-y:auto;display:flex;flex-direction:column}
.sb-mods{padding:0 .75rem;display:flex;flex-direction:column;gap:2px;flex:1}
.mb{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--rs);cursor:pointer;transition:background .12s;border:1px solid transparent}
.mb:hover{background:var(--bg3)}
.mb.on{background:var(--bg3);border-color:var(--b2)}
.mb.lk{opacity:.3;cursor:not-allowed;pointer-events:none}
.mb-icon{width:30px;height:30px;border-radius:8px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.mb-icon.done{background:var(--grd);border-color:var(--grb)}
.mb-icon.cur{background:var(--pd);border-color:var(--pb)}
.mb-meta{flex:1;min-width:0}
.mb-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.mb-sub{font-size:11px;color:var(--t3)}
.mb-sub.done{color:var(--green)}
.mb-sub.cur{color:var(--purple)}
.sb-foot{padding:1rem 1.25rem;border-top:1px solid var(--border);margin-top:auto}
.sb-pl{font-size:11px;color:var(--t3);display:flex;justify-content:space-between;margin-bottom:7px}
.sb-pl span{color:var(--t2);font-weight:600}
.sb-bar{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden}
.sb-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--gold));border-radius:2px;transition:width .5s}
.main{padding:2rem 2.5rem;max-width:860px}
.mod-hero{margin-bottom:2rem;padding-bottom:2rem;border-bottom:1px solid var(--border)}
.mod-badge{display:inline-block;font-size:10px;color:var(--purple);background:var(--pd);border:1px solid var(--pb);padding:3px 10px;border-radius:20px;font-family:'Unbounded',sans-serif;letter-spacing:.5px;margin-bottom:10px}
.mod-h1{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:700;line-height:1.35;margin-bottom:8px}
.mod-p{font-size:14px;color:var(--t2);line-height:1.7;max-width:560px}
.prog-row{display:flex;align-items:center;gap:10px;margin-top:1.25rem}
.prog-bar{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--gold));border-radius:3px;transition:width .4s}
.prog-lbl{font-size:12px;color:var(--t3);white-space:nowrap}
.steps{display:flex;flex-direction:column;gap:8px}
.step{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.step.done{border-color:var(--grb);background:var(--grd)}
.step.open{border-color:var(--b2)}
.step-hd{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none}
.step-n{width:30px;height:30px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--t3);flex-shrink:0;font-family:'Unbounded',sans-serif}
.step-n.done{background:var(--grd);border-color:var(--grb);color:var(--green)}
.step-hd-meta{flex:1}
.step-hd-title{font-size:13px;font-weight:700;margin-bottom:2px}
.step-hd-sub{font-size:11px;color:var(--t3)}
.step-chev{font-size:10px;color:var(--t3);transition:transform .2s}
.step.open .step-chev{transform:rotate(180deg)}
.step-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.step.open .step-body{display:block}
.step-txt{font-size:13px;color:var(--t2);line-height:1.75;margin:14px 0 10px}
.os-tabs{display:flex;gap:4px;margin:10px 0 6px}
.os-tab{font-size:11px;font-weight:600;padding:4px 12px;border-radius:6px;border:1px solid var(--border);color:var(--t3);cursor:pointer;font-family:'Mulish',sans-serif}
.os-tab.on{background:var(--bg3);color:var(--text);border-color:var(--b2)}
.os-cnt{display:none}
.os-cnt.on{display:block}
.code-wrap{background:#0e0e16;border:1px solid var(--border);border-radius:var(--rs);margin:10px 0;overflow:hidden}
.code-top{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;border-bottom:1px solid var(--border)}
.code-lang{font-size:10px;color:var(--t3);font-family:'Unbounded',sans-serif;letter-spacing:.8px}
.code-copy{font-size:11px;color:var(--t3);cursor:pointer;background:var(--bg3);border:1px solid var(--border);padding:3px 10px;border-radius:5px;font-family:'Mulish',sans-serif}
.code-pre{padding:12px 14px;font-family:'SF Mono','Fira Code',monospace;font-size:12px;color:#cdd6f4;line-height:1.75;white-space:pre-wrap;word-break:break-all}
.pills{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.pill{font-size:11px;color:var(--t2);background:var(--bg3);border:1px solid var(--border);padding:4px 11px;border-radius:20px;display:flex;align-items:center;gap:5px}
.pill-dot{width:5px;height:5px;border-radius:50%;background:var(--purple);flex-shrink:0}
.note-box{background:var(--gd);border:1px solid var(--gb);border-radius:var(--rx);padding:10px 14px;margin:10px 0;font-size:12px;color:var(--gold);line-height:1.65}
.info-box{background:var(--pd);border:1px solid var(--pb);border-radius:var(--rx);padding:10px 14px;margin:10px 0;font-size:12px;color:#c890e0;line-height:1.65}
.link-btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--purple);background:var(--pd);border:1px solid var(--pb);padding:6px 14px;border-radius:8px;margin:6px 0}
.step-acts{display:flex;align-items:center;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.btn-done{display:inline-flex;align-items:center;gap:6px;padding:8px 20px;background:var(--purple);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Mulish',sans-serif}
.btn-done:hover{background:#9a4fb5}
.btn-done:disabled{opacity:.5;cursor:not-allowed}
.btn-undo{padding:7px 14px;background:none;color:var(--t3);border:1px solid var(--border);border-radius:8px;font-size:11px;cursor:pointer;font-family:'Mulish',sans-serif}
.done-tag{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--green);font-weight:600}
.stu-form{background:var(--bg3);border:1px solid var(--b2);border-radius:var(--rs);padding:14px;margin:12px 0}
.sf-title{font-size:12px;font-weight:700;color:var(--purple);margin-bottom:10px}
.sf-label{display:block;font-size:11px;color:var(--t2);margin-bottom:4px}
.sf-input{width:100%;padding:8px 12px;border:1px solid var(--b2);border-radius:var(--rx);background:var(--bg2);color:var(--text);font-size:12px;font-family:'Mulish',sans-serif;outline:none;margin-bottom:8px}
.sf-input:disabled{opacity:.5}
.sf-btn{padding:8px 18px;background:var(--purple);color:#fff;border:none;border-radius:var(--rx);font-size:12px;font-weight:700;cursor:pointer;font-family:'Mulish',sans-serif}
.sf-btn:disabled{opacity:.5;cursor:not-allowed}
.sf-sent{font-size:11px;color:var(--green);margin-top:6px}
.sf-edit{padding:6px 14px;background:none;color:var(--t3);border:1px solid var(--border);border-radius:var(--rx);font-size:11px;cursor:pointer;font-family:'Mulish',sans-serif;margin-left:8px}
.fp-box{background:var(--pd);border:1px solid var(--pb);border-radius:var(--rs);padding:14px;margin:12px 0}
.fp-title{font-size:11px;color:var(--purple);font-weight:700;margin-bottom:10px}
.fp-wait{font-size:12px;color:var(--t3);font-style:italic}
.fp-row{margin-bottom:8px}
.fp-lbl{font-size:10px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.fp-val{font-size:12px;color:var(--text);background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:7px 10px;font-family:'SF Mono','Fira Code',monospace;display:flex;align-items:center;gap:8px}
.fp-val span{flex:1;word-break:break-all}
.fp-copy{font-size:10px;color:var(--t3);cursor:pointer;padding:2px 8px;border:1px solid var(--border);border-radius:4px;background:var(--bg);white-space:nowrap;font-family:'Mulish',sans-serif}
.locked-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;text-align:center;gap:14px}
.locked-icon{width:60px;height:60px;border-radius:16px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:26px}
.locked-h{font-family:'Unbounded',sans-serif;font-size:17px;font-weight:600}
.locked-p{font-size:13px;color:var(--t2);max-width:300px;line-height:1.65}
.adm-wrap{padding:2rem;max-width:1100px}
.adm-h{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:700;margin-bottom:4px}
.adm-sub{font-size:13px;color:var(--t2);margin-bottom:1.5rem}
.adm-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:2rem}
.adm-stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:1rem 1.25rem}
.adm-stat-n{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:700;color:var(--purple);margin-bottom:4px}
.adm-stat-l{font-size:11px;color:var(--t3)}
.adm-refresh{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;font-family:'Mulish',sans-serif;margin-bottom:1.5rem}
.sec-h{font-size:10px;color:var(--t3);font-family:'Unbounded',sans-serif;letter-spacing:1px;margin:0 0 12px}
.stu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(460px,1fr));gap:16px}
.stu-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.stu-card-hd{padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.stu-avatar{width:36px;height:36px;border-radius:10px;background:var(--pd);border:1px solid var(--pb);display:flex;align-items:center;justify-content:center;font-family:'Unbounded',sans-serif;font-size:13px;font-weight:700;color:var(--purple)}
.stu-name{font-size:15px;font-weight:700;margin-bottom:2px}
.stu-prog-txt{font-size:11px;color:var(--t3)}
.stu-prog-bar{height:2px;background:var(--bg4)}
.stu-prog-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--gold))}
.stu-body{padding:1rem 1.25rem;display:flex;flex-direction:column;gap:10px}
.ex-row{display:flex;flex-direction:column;gap:5px}
.ex-lbl{font-size:10px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:6px}
.tag{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:700}
.tag-from{background:var(--pd);color:var(--purple);border:1px solid var(--pb)}
.tag-to{background:var(--gd);color:var(--gold);border:1px solid var(--gb)}
.ex-val{font-size:12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rx);padding:7px 10px;word-break:break-all}
.ex-val.empty{color:var(--t3);font-style:italic;font-size:11px}
.ex-inp-row{display:flex;gap:6px}
.ex-inp{flex:1;padding:7px 10px;border:1px solid var(--b2);border-radius:var(--rx);background:var(--bg);color:var(--text);font-size:12px;font-family:'Mulish',sans-serif;outline:none}
.ex-save{padding:7px 14px;background:var(--purple);color:#fff;border:none;border-radius:var(--rx);font-size:11px;font-weight:700;cursor:pointer;font-family:'Mulish',sans-serif;white-space:nowrap}
.ex-save:disabled{opacity:.5;cursor:not-allowed}
.ex-edit{font-size:10px;color:var(--t3);cursor:pointer;padding:2px 8px;border:1px solid var(--border);border-radius:4px;background:var(--bg);font-family:'Mulish',sans-serif}
.ex-val-row{display:flex;align-items:center;gap:6px}
.divider{height:1px;background:var(--border)}
.open-url{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Mulish',sans-serif;text-decoration:none}
.open-url.has-url{background:var(--grd);border-color:var(--grb);color:var(--green)}
.open-url.no-url{opacity:.3;pointer-events:none}
.connecting{display:flex;align-items:center;justify-content:center;min-height:300px;flex-direction:column;gap:12px}
textarea.ex-inp{min-height:100px;line-height:1.6;font-family:'Mulish',sans-serif}
.connecting span{font-size:13px;color:var(--t2)}
@media(max-width:720px){.layout{grid-template-columns:1fr}.sidebar{display:none}.main,.adm-wrap{padding:1.25rem}.stu-grid{grid-template-columns:1fr}.adm-stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

// ── SUPABASE ──
function sbHeaders() {
  return {
    'apikey': SB_KEY,
    'Authorization': 'Bearer ' + SB_KEY,
    'Content-Type': 'application/json'
  };
}

async function sbGet(table, filter) {
  var url = SB_URL + '/rest/v1/' + table + '?' + filter + '&select=*';
  var res = await fetch(url, {method:'GET', headers: sbHeaders()});
  if (!res.ok) throw new Error('GET ' + table + ' failed: ' + res.status);
  return res.json();
}

async function sbPost(table, body) {
  var res = await fetch(SB_URL + '/rest/v1/' + table, {
    method: 'POST',
    headers: Object.assign({}, sbHeaders(), {'Prefer': 'return=minimal'}),
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error('POST ' + table + ' failed: ' + res.status + ' ' + await res.text());
}

async function sbPatch(table, filter, body) {
  var res = await fetch(SB_URL + '/rest/v1/' + table + '?' + filter, {
    method: 'PATCH',
    headers: Object.assign({}, sbHeaders(), {'Prefer': 'return=minimal'}),
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error('PATCH ' + table + ' failed: ' + res.status + ' ' + await res.text());
  return res;
}

async function sbDelete(table, filter) {
  var res = await fetch(SB_URL + '/rest/v1/' + table + '?' + filter, {
    method: 'DELETE',
    headers: sbHeaders()
  });
  if (!res.ok) throw new Error('DELETE failed: ' + res.status);
}

async function upsertProgress(login, stepKey, completed) {
  var rows = await sbGet('student_progress', 'student_login=eq.' + login + '&step_key=eq.' + encodeURIComponent(stepKey));
  if (rows.length > 0) {
    await sbPatch('student_progress', 'student_login=eq.' + login + '&step_key=eq.' + encodeURIComponent(stepKey),
      {completed: completed, completed_at: completed ? new Date().toISOString() : null});
  } else {
    await sbPost('student_progress', {student_login: login, step_key: stepKey, completed: completed, completed_at: completed ? new Date().toISOString() : null});
  }
}

async function upsertData(login, fieldKey, value, dir) {
  var rows = await sbGet('student_data', 'student_login=eq.' + login + '&field_key=eq.' + encodeURIComponent(fieldKey) + '&direction=eq.' + dir);
  if (rows.length > 0) {
    await sbPatch('student_data', 'student_login=eq.' + login + '&field_key=eq.' + encodeURIComponent(fieldKey) + '&direction=eq.' + dir,
      {field_value: value, updated_at: new Date().toISOString()});
  } else {
    await sbPost('student_data', {student_login: login, field_key: fieldKey, field_value: value, direction: dir, updated_at: new Date().toISOString()});
  }
}

async function loadStudentData(login) {
  var prog = await sbGet('student_progress', 'student_login=eq.' + login);
  var data = await sbGet('student_data', 'student_login=eq.' + login);
  PROG = {};
  prog.forEach(function(r){ PROG[r.step_key] = r.completed; });
  FROM_STU = {};
  FROM_PAV = {};
  data.forEach(function(r){
    if (r.direction === 'from_student') FROM_STU[r.field_key] = r.field_value;
    else FROM_PAV[r.field_key] = r.field_value;
  });
}

async function loadAllData() {
  var prog = await sbGet('student_progress', 'select=student_login,step_key,completed');
  var data = await sbGet('student_data', 'select=student_login,field_key,field_value,direction');
  var result = {};
  STUDENTS.forEach(function(u){ result[u] = {prog:{}, fs:{}, fp:{}}; });
  prog.forEach(function(r){ if(result[r.student_login]) result[r.student_login].prog[r.step_key] = r.completed; });
  data.forEach(function(r){
    if (!result[r.student_login]) return;
    if (r.direction === 'from_student') result[r.student_login].fs[r.field_key] = r.field_value;
    else result[r.student_login].fp[r.field_key] = r.field_value;
  });
  return result;
}

// ── AUTH ──
async function doLogin() {
  var login = document.getElementById('li').value.trim().toLowerCase();
  var err = document.getElementById('lerr');
  var btn = document.getElementById('login-btn');
  if (!login) { err.textContent = 'Введи ник'; err.style.display = 'block'; return; }
  err.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Входим...';
  try {
    await enterAs(login);
    localStorage.setItem('gas_session', login);
  } catch(e) {
    err.textContent = 'Ошибка: ' + e.message;
    err.style.display = 'block';
    CUR = '';
  }
  btn.disabled = false; btn.textContent = 'Войти';
}

async function enterAs(login) {
  var role = (USERS[login] && USERS[login].role) || 'student';
  CUR = login;
  if (role === 'admin') {
    showPage('pg-admin');
    await renderAdmin();
  } else {
    await loadStudentData(login);
    showPage('pg-student');
    document.getElementById('stu-name-hdr').textContent = login;
    renderSidebar();
    renderMain();
  }
}

function doLogout() {
  CUR = ''; CUR_MOD = 0; OPEN = {};
  PROG = {}; FROM_STU = {}; FROM_PAV = {};
  localStorage.removeItem('gas_session');
  showPage('pg-login');
  document.getElementById('li').value = '';
}

function showPage(id) {
  ['pg-login','pg-student','pg-admin'].forEach(function(p){ document.getElementById(p).classList.add('hide'); });
  document.getElementById(id).classList.remove('hide');
}

// ── SIDEBAR ──
function isLocked(m) {
  if (m.locked === true) return true;
  if (m.locked === 'prd') return !FROM_PAV['project_prd'];
  return false;
}
function totalSteps() { return MODS.filter(function(m){return !isLocked(m);}).reduce(function(a,m){return a+m.steps.length;},0); }
function doneCount()  { return Object.values(PROG).filter(Boolean).length; }
function modDone(i)   { var m=MODS[i]; return m.steps.length>0 && m.steps.every(function(_,si){return PROG[i+'-'+si];}); }
function modProgN(i)  { return MODS[i].steps.filter(function(_,si){return PROG[i+'-'+si];}).length; }

function renderSidebar() {
  var html = '';
  MODS.forEach(function(m, i) {
    var lk=isLocked(m), done=modDone(i), cur=CUR_MOD===i, p=modProgN(i);
    var ic = done?'done':cur?'cur':'';
    var st = lk?'Заблокировано':done?'Выполнено ✓':cur?(p+'/'+m.steps.length+' шагов'):(m.steps.length?m.steps.length+' шагов':'');
    var sc = done?'done':cur?'cur':'';
    var iconTxt = done?'✓':m.icon;
    var onclick = lk?'':('goMod('+i+')');
    html += '<div class="mb'+(cur?' on':'')+(lk?' lk':'')+'"'+(onclick?' onclick="'+onclick+'"':'')+' style="cursor:'+(lk?'not-allowed':'pointer')+'">';
    html += '<div class="mb-icon '+ic+'">'+iconTxt+'</div>';
    html += '<div class="mb-meta"><div class="mb-name">'+m.title+'</div><div class="mb-sub '+sc+'">'+st+'</div></div>';
    if(lk) html += '<span style="font-size:11px;color:var(--t3)">🔒</span>';
    html += '</div>';
  });
  document.getElementById('sb-nav').innerHTML = html;
  var pct = totalSteps()>0 ? Math.round(doneCount()/totalSteps()*100) : 0;
  document.getElementById('sb-fill').style.width = pct+'%';
  document.getElementById('sb-pct').textContent = pct+'%';
}
function goMod(i) { CUR_MOD=i; OPEN={}; renderSidebar(); renderMain(); window.scrollTo(0,0); }

// ── STUDENT MAIN ──
function renderMain() {
  var mi=CUR_MOD, m=MODS[mi], el=document.getElementById('stu-main');
  if (isLocked(m)) {
    el.innerHTML = '<div class="locked-screen"><div class="locked-icon">🔒</div><div class="locked-h">Модуль заблокирован</div><div class="locked-p">Выполни предыдущие модули. Павел откроет доступ.</div></div>';
    return;
  }
  var p=modProgN(mi), t=m.steps.length, pct=t>0?Math.round(p/t*100):0;
  var html = '';
  html += '<div class="mod-hero">';
  html += '<div class="mod-badge">МОДУЛЬ '+(mi+1)+'</div>';
  html += '<div class="mod-h1">'+m.title+'</div>';
  html += '<div class="mod-p">'+m.desc+'</div>';
  if(t>0) html += '<div class="prog-row"><div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div><div class="prog-lbl">'+p+' / '+t+'</div></div>';
  html += '</div>';
  html += '<div class="steps">';
  m.steps.forEach(function(s,si){ html += buildStep(s, si, mi+'-'+si, !!PROG[mi+'-'+si], !!OPEN[mi+'-'+si]); });
  html += '</div>';
  el.innerHTML = html;
}

function buildStep(s, si, key, done, open) {
  var b = '';
  if(s.txt) b += '<div class="step-txt">'+s.txt+'</div>';

  if(s.link) b += '<a href="'+s.link+'" target="_blank" class="link-btn">'+s.linkLabel+' ↗</a>';
  if(s.linkWin) b += '<a href="'+s.linkWin+'" target="_blank" class="link-btn" style="margin-left:6px">'+s.linkWinLabel+' ↗</a>';
  if(s.pills) {
    b += '<div class="pills">';
    s.pills.forEach(function(p){ b += '<div class="pill"><div class="pill-dot"></div>'+p+'</div>'; });
    b += '</div>';
  }

  if(s.cmdMac && s.cmdWin) {
    var cid = 'c-'+key;
    b += '<div class="os-tabs" style="margin-top:10px">';
    b += '<div class="os-tab on" onclick="swOs(this,\''+cid+'-m\',\''+cid+'-w\')">Mac / Linux</div>';
    b += '<div class="os-tab" onclick="swOs(this,\''+cid+'-w\',\''+cid+'-m\')">Windows</div>';
    b += '</div>';
    b += '<div class="os-cnt on" id="'+cid+'-m">'+mkCode(s.cmdMac,'cm-'+key)+'</div>';
    b += '<div class="os-cnt" id="'+cid+'-w">'+mkCode(s.cmdWin,'cw-'+key)+'</div>';
  } else if(s.cmdBoth) {
    b += mkCode(s.cmdBoth, 'cb-'+key);
  }

  if(s.info) b += '<div class="info-box">💡 '+s.info+'</div>';
  if(s.note) b += '<div class="note-box">⚡ '+s.note+'</div>';

  if(s.download) {
    b += '<div style="margin:12px 0"><button class="btn-done" style="background:var(--gold);color:#18181f" onclick="downloadWelcome()">⬇ Скачать index.html</button></div>';
  }

  if(s.prdDownload && FROM_PAV['project_prd_file']) {
    b += '<div style="margin:12px 0"><button class="btn-done" style="background:var(--purple)" onclick="downloadPRD()">⬇ Скачать PRD.md</button></div>';
  }

  if(s.stuInput) {
    var sent = s.stuInput.every(function(f){ return FROM_STU[f.key]; });
    b += '<div class="stu-form"><div class="sf-title">📤 Отправь Павлу</div>';
    s.stuInput.forEach(function(f){
      b += '<label class="sf-label">'+f.label+'</label>';
      b += '<input class="sf-input" id="sfi-'+key+'-'+f.key+'" value="'+(FROM_STU[f.key]||'')+'" placeholder="'+f.ph+'"'+(sent?' disabled':'')+' />';
    });
    if(sent) {
      b += '<div class="sf-sent">✓ Отправлено</div>';
      b += '<button class="sf-edit" onclick="clearStuInput(\''+key+'\',\''+s.stuInput.map(function(f){return f.key;}).join(',')+'\')">Изменить</button>';
    } else {
      b += '<button class="sf-btn" id="sfbtn-'+key+'" onclick="sendStuInput(\''+key+'\',\''+s.stuInput.map(function(f){return f.key;}).join(',')+'\')">Отправить Павлу →</button>';
    }
    b += '</div>';
  }

  if(s.pavData) {
    var hasData = s.pavData.some(function(f){ return FROM_PAV[f.key]; });
    b += '<div class="fp-box"><div class="fp-title">📩 От Павла</div>';
    if(hasData) {
      s.pavData.forEach(function(f){
        if(!FROM_PAV[f.key]) return;
        b += '<div class="fp-row"><div class="fp-lbl">'+f.label+'</div>';
        b += '<div class="fp-val"><span>'+FROM_PAV[f.key]+'</span>';
        b += '<button class="fp-copy" onclick="cpText(this,\''+FROM_PAV[f.key].replace(/'/g,"\\'").replace(/\\/g,'\\\\')+'\')">Копировать</button>';
        b += '</div></div>';
      });
    } else {
      b += '<div class="fp-wait">Ожидай — Павел скоро пришлёт данные...</div>';
    }
    b += '</div>';
  }

  b += '<div class="step-acts">';
  if(done) {
    b += '<div class="done-tag">✓ Выполнено</div>';
    b += '<button class="btn-undo" onclick="togProg(\''+key+'\',false)">Отменить</button>';
  } else {
    b += '<button class="btn-done" id="bp-'+key+'" onclick="togProg(\''+key+'\',true)">✓ Выполнено</button>';
  }
  b += '</div>';

  var stepHtml = '<div class="step'+(done?' done':'')+(open?' open':'')+'" id="st-'+key+'">';
  stepHtml += '<div class="step-hd" onclick="togOpen(\''+key+'\')"><div class="step-n'+(done?' done':'')+'">'+( done?'✓':(si+1) )+'</div>';
  stepHtml += '<div class="step-hd-meta"><div class="step-hd-title">'+s.title+'</div><div class="step-hd-sub">'+(s.sub||'')+'</div></div>';
  stepHtml += '<div class="step-chev">▼</div></div>';
  stepHtml += '<div class="step-body">'+b+'</div>';
  stepHtml += '</div>';
  return stepHtml;
}

function mkCode(cmd, id) {
  var h = '<div class="code-wrap">';
  h += '<div class="code-top"><span class="code-lang">TERMINAL</span>';
  h += '<button class="code-copy" onclick="cpCode(\''+id+'\')">Копировать</button></div>';
  h += '<div class="code-pre" id="cp-'+id+'">'+cmd+'</div>';
  h += '</div>';
  return h;
}

// ── STUDENT ACTIONS ──
async function togProg(key, val) {
  var btn = document.getElementById('bp-'+key);
  if(btn) { btn.disabled=true; btn.textContent='...'; }
  try {
    await upsertProgress(CUR, key, val);
    PROG[key] = val;
    renderSidebar(); renderMain();
  } catch(e) {
    alert('Ошибка: '+e.message);
    if(btn) { btn.disabled=false; btn.textContent='✓ Выполнено'; }
  }
}

async function sendStuInput(key, keysStr) {
  var keys = keysStr.split(',');
  var btn = document.getElementById('sfbtn-'+key);
  if(btn) { btn.disabled=true; btn.textContent='...'; }
  var vals = {};
  var ok = true;
  keys.forEach(function(k){
    var el = document.getElementById('sfi-'+key+'-'+k);
    if(el && el.value.trim()) vals[k] = el.value.trim();
    else ok = false;
  });
  if(!ok) { alert('Заполни все поля'); if(btn){btn.disabled=false;btn.textContent='Отправить Павлу →';} return; }
  try {
    for(var k in vals) {
      await upsertData(CUR, k, vals[k], 'from_student');
      FROM_STU[k] = vals[k];
    }
    renderMain();
  } catch(e) {
    alert('Ошибка: '+e.message);
    if(btn) { btn.disabled=false; btn.textContent='Отправить Павлу →'; }
  }
}

async function clearStuInput(key, keysStr) {
  var keys = keysStr.split(',');
  try {
    for(var i=0;i<keys.length;i++) {
      await sbDelete('student_data', 'student_login=eq.'+CUR+'&field_key=eq.'+encodeURIComponent(keys[i])+'&direction=eq.from_student');
      delete FROM_STU[keys[i]];
    }
    renderMain();
  } catch(e) { alert('Ошибка: '+e.message); }
}

function togOpen(key) { OPEN[key]=!OPEN[key]; renderMain(); }

async function savePF(user, fk, sid) {
  var inp = document.getElementById(sid);
  var val = inp ? inp.value.trim() : '';
  if(!val) { alert('Введи значение'); return; }
  var btn = inp.nextElementSibling;
  if(btn) { btn.disabled=true; btn.textContent='...'; }
  try {
    await upsertData(user, fk, val, 'from_pavel');
    await renderAdmin();
  } catch(e) {
    alert('Ошибка: '+e.message);
    if(btn) { btn.disabled=false; btn.textContent='Сохранить'; }
  }
}

async function savePRD(user, descId, fileId) {
  var ta = document.getElementById(descId);
  var desc = ta ? ta.value.trim() : '';
  var fileInput = document.getElementById(fileId);
  var file = fileInput && fileInput.files[0];
  if(!desc && !file) { alert('Напиши описание или загрузи PRD файл'); return; }
  var btn = document.querySelector('#'+descId).closest('.ex-row').querySelector('.ex-save');
  if(btn) { btn.disabled=true; btn.textContent='Сохраняем...'; }
  try {
    await upsertData(user, 'project_prd', desc || '(см. PRD файл)', 'from_pavel');
    if(file) {
      var text = await file.text();
      await upsertData(user, 'project_prd_file', text, 'from_pavel');
    }
    await renderAdmin();
  } catch(e) {
    alert('Ошибка: '+e.message);
    if(btn) { btn.disabled=false; btn.textContent='🚀 Открыть проект'; }
  }
}

async function resetPRD(user) {
  try {
    await sbDelete('student_data', 'student_login=eq.'+user+'&field_key=eq.project_prd&direction=eq.from_pavel');
    await sbDelete('student_data', 'student_login=eq.'+user+'&field_key=eq.project_prd_file&direction=eq.from_pavel');
    await renderAdmin();
  } catch(e) { alert('Ошибка: '+e.message); }
}

async function delPF(user, fk) {
  try {
    await sbDelete('student_data', 'student_login=eq.'+user+'&field_key=eq.'+encodeURIComponent(fk)+'&direction=eq.from_pavel');
    await renderAdmin();
  } catch(e) { alert('Ошибка: '+e.message); }
}

// ── UTILS ──
function cpCode(id) {
  var el = document.getElementById('cp-'+id);
  if(!el) return;
  navigator.clipboard.writeText(el.textContent).then(function(){
    var b = el.closest('.code-wrap').querySelector('.code-copy');
    b.textContent='Скопировано ✓'; b.style.color='var(--green)';
    setTimeout(function(){ b.textContent='Копировать'; b.style.color=''; }, 2000);
  });
}
function cpText(btn, val) {
  navigator.clipboard.writeText(val).then(function(){
    var o=btn.textContent; btn.textContent='✓'; btn.style.color='var(--green)';
    setTimeout(function(){ btn.textContent=o; btn.style.color=''; }, 2000);
  });
}
function swOs(btn, showId, hideId) {
  btn.parentElement.querySelectorAll('.os-tab').forEach(function(t){ t.classList.remove('on'); });
  btn.classList.add('on');
  var s=document.getElementById(showId), h=document.getElementById(hideId);
  if(s) s.classList.add('on');
  if(h) h.classList.remove('on');
}

  a.click();
}
